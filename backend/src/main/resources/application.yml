server:
  port: ${SERVER_PORT:19082}

spring:
  application:
    name: wujie-im
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/wujie_im?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5000}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:8}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.wujie.im.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:900000}
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:604800000}

wujie:
  im:
    websocket:
      heartbeat-interval: ${WS_HEARTBEAT_INTERVAL:30000}
    crypto:
      aes-key: ${AES_KEY:}
    minio:
      endpoint: http://127.0.0.1:9010
      access-key: minioadmin
      secret-key: minioadmin
      bucket: wujie-im
    ai:
      minimax:
        api-url: ${MINIMAX_API_URL:https://api.minimax.chat/v1/text/chatcompletion_v2}
      glm:
        api-url: ${GLM_API_URL:https://open.bigmodel.cn/api/paas/v4/chat/completions}
      deepseek:
        api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}

ftp:
  host: ${FTP_HOST:}
  port: ${FTP_PORT:21}
  username: ${FTP_USERNAME:}
  password: ${FTP_PASSWORD:}
  path: ${FTP_PATH:/ftp/}
  url-prefix: ${FTP_URL_PREFIX:}
